<div class='game-settings'>
    <link rel="stylesheet" type="text/css" href="{{baseUrl}}styles.css" />

    <form>
        <table>
            <tbody>
                <tr>
                    <td>N<button is="n-tooltip-button" type="button" tooltip="How many steps back to match. N=2 means you compare the current stimulus to the one 2 turns ago. Higher values are harder.">?</button></td>
                    <td><input type="number" min="1" max="30" name="n" required /></td>
                </tr>
                <tr>
                    <td>Length<button is="n-tooltip-button" type="button" tooltip="Total number of turns per game round.">?</button></td>
                    <td><input type="number" min="1" max="100" name="length" required /></td>
                </tr>
                <tr>
                    <td>Turn time (sec)<button is="n-tooltip-button" type="button" tooltip="How long each turn lasts in seconds before advancing automatically.">?</button></td>
                    <td><input type="number" min="1" max="15" name="turnTime" step="0.01" required /></td>
                </tr>
                <tr>
                    <td>Probability</br>multiplier<button is="n-tooltip-button" type="button" tooltip="Multiplier for how often a matching stimulus appears. Higher values give more matches to respond to.">?</button></td>
                    <td><input type="number" min="1" max="20" name="probMulti" required /></td>
                </tr>
                <tr>
                    <td>Show right answers<button is="n-tooltip-button" type="button" tooltip="Highlight correct answers after each turn so you can learn from mistakes.">?</button></td>
                    <td>
                        <input type="checkbox" id="show-right-answers" name="showRightAnswers" />
                        <label for="show-right-answers">
                            Yes
                        </label>
                    </td>
                </tr>
                <tr>
                    <td rowspan="4">Sequences<button is="n-tooltip-button" type="button" tooltip="Which stimulus types to include. Position tracks grid location, Color tracks the cell color, Shape tracks letters or digits shown.">?</button></td>
                <tr>
                    <td>
                        <input type="checkbox" id="sequence-position" value="position" name="sequences" />
                        <label for="sequence-position">
                            Position
                        </label>
                    </td>
                </tr>
                <tr>
                    <td>
                        <input type="checkbox" id="sequence-color" value="color" name="sequences" />
                        <label for="sequence-color">
                            Color
                        </label>
                    </td>
                </tr>
                <tr>
                    <td class="radio">
                        <fieldset class="game-settings__sequence-char">
                            <legend>Shape</legend>

                            <label for="sequence-letters">
                                <input type="radio" id="sequence-letters" value="letters" name="sequences" />
                                Letters
                            </label>

                            <label for="sequence-digits">
                                <input type="radio" id="sequence-digits" value="digits" name="sequences" />
                                Digits
                            </label>

                            <label for="sequence-no">
                                <input type="radio" id="sequence-no" value="" name="sequences" />
                                No
                            </label>
                        </fieldset>
                    </td>
                </tr>
            </tbody>
        </table>
    </form>
</div>
